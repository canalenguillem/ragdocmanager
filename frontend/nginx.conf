server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /auth {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    location /documents {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        client_max_body_size 55M;
    }

    location /query {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    location /settings {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:4000;
    }

    location /api/ {
        proxy_pass http://backend:4000/;
        proxy_set_header Host $host;
        client_max_body_size 55M;
    }
}
